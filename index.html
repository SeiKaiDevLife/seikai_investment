<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Portfolio | 投资全景看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        
        <!-- 顶栏导航 -->
        <nav class="top-nav" id="main-nav">
            <div class="nav-links">
                <a href="#" class="nav-item active" onclick="switchTab('home')">全景看板</a>
                <a href="#" class="nav-item" onclick="switchTab('funds')">基金列表</a>
            </div>
            <div class="status-indicator">
                <span class="dot pulse"></span> 实盘估值中
                <span id="lastUpdateTime" style="margin-left: 12px; color: var(--text-muted);">--</span>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            
            <!-- ================= 全景看板 (Home View) ================= -->
            <div id="view-home" class="view-section">
                <!-- 核心数据大屏 -->
                <div class="hero-stats">
                    <div class="stat-card main-stat">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        </div>
                        <div class="stat-info">
                            <div class="label">总资产估值 (CNY)</div>
                            <div class="value" id="totalAssets">0.00</div>
                            <div class="sub-label">投入本金: <span id="totalCost">0.00</span></div>
                        </div>
                    </div>
                    
                    <div class="stat-card double-stat">
                        <div class="stat-info" style="flex:1;">
                            <div class="label">累计总盈亏</div>
                            <div class="value neutral" id="totalPnl">0.00</div>
                            <div class="pnl-badge neutral" style="margin-left:0;" id="totalPnlRate">0.00%</div>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-info" style="flex:1; text-align:right;">
                            <div class="label">今日预估盈亏</div>
                            <div class="value neutral" id="todayPnl">0.00</div>
                            <div class="sub-label">较昨日变动</div>
                        </div>
                    </div>
                </div>

                <!-- 酷炫图表矩阵 -->
                <div class="charts-matrix">
                    <!-- 全盘走势图 -->
                    <div class="matrix-card">
                        <div class="card-head" style="display:flex; justify-content:space-between; align-items:flex-end;">
                            <div>
                                <h3>📈 全盘组合累计收益走势 (Weighted Total Return)</h3>
                                <span class="head-desc">根据您的持仓本金自动加权计算出的总体资产历史走势</span>
                            </div>
                            <div class="movers-sort-tabs">
                                <span class="mover-tab" onclick="setTrendRange('1w', this)">1周</span>
                                <span class="mover-tab" onclick="setTrendRange('1m', this)">1月</span>
                                <span class="mover-tab active" onclick="setTrendRange('3m', this)">3月</span>
                                <span class="mover-tab" onclick="setTrendRange('all', this)">全部</span>
                            </div>
                        </div>
                        <div id="overallTrendChart" class="echarts-container"></div>
                    </div>
                    
                    <!-- 龙虎榜 -->
                    <div class="matrix-card">
                        <div class="card-head" style="display:flex; justify-content:space-between; align-items:center;">
                            <h3>🔥 今日异动榜</h3>
                            <div class="movers-sort-tabs">
                                <span class="mover-tab active" onclick="setMoversSort('rate_desc', this)">涨幅榜</span>
                                <span class="mover-tab" onclick="setMoversSort('rate_asc', this)">跌幅榜</span>
                                <span class="mover-tab" onclick="setMoversSort('val_desc', this)">赚最多</span>
                                <span class="mover-tab" onclick="setMoversSort('val_asc', this)">亏最多</span>
                            </div>
                        </div>
                        <div class="movers-list" id="moversList">
                            <!-- JS 渲染今日涨跌幅前列的基金 -->
                        </div>
                    </div>

                    <!-- 持仓分布 -->
                    <div class="matrix-card">
                        <div class="card-head">
                            <h3>📊 持仓本金分布</h3>
                        </div>
                        <div id="overallPieChart" style="height: 350px; width: 100%;"></div>
                    </div>
                </div>
            </div>

            <!-- ================= 基金列表 (Funds View) ================= -->
            <div id="view-funds" class="view-section" style="display: none;">
                <div class="custom-sort-bar">
                    <div class="sort-buttons">
                        <button class="sort-btn active" data-sort="cost" onclick="setSort('cost')">持仓本金 <span class="sort-icon">↓</span></button>
                        <button class="sort-btn" data-sort="totalRate" onclick="setSort('totalRate')">总收益率 <span class="sort-icon"></span></button>
                        <button class="sort-btn" data-sort="todayRate" onclick="setSort('todayRate')">今日涨跌 <span class="sort-icon"></span></button>
                    </div>
                </div>
                <div class="fund-grid" id="fundGrid">
                    <!-- JS 生成 -->
                </div>
            </div>

            <!-- ================= 详情视图 (Detail View) ================= -->
            <div id="view-detail" class="view-section" style="display: none;">
                <div class="detail-header-sticky">
                    <button class="back-btn" onclick="hideDetail()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        返回列表
                    </button>
                    <div style="text-align: right;">
                        <h1 id="detail-name" style="font-size:20px; margin-bottom:4px;">--</h1>
                        <div class="detail-tags" style="justify-content: flex-end;">
                            <span class="tag" id="detail-code">--</span>
                            <span class="tag" id="detail-manager">--</span>
                        </div>
                    </div>
                </div>

                <div class="detail-hero">
                    <div class="detail-hero-stats">
                        <div>
                            <div class="label">近1月</div>
                            <div class="val" id="detail-1m">--</div>
                        </div>
                        <div>
                            <div class="label">近1年</div>
                            <div class="val" id="detail-1y">--</div>
                        </div>
                        <div>
                            <div class="label">规模</div>
                            <div class="val" id="detail-scale">--</div>
                        </div>
                    </div>
                </div>

                <div class="detail-matrix">
                    <div class="matrix-card col-span-2">
                        <div class="card-head" style="display:flex; justify-content:space-between; align-items:flex-end;">
                            <div>
                                <h3>📈 累计收益走势 (含基准对比)</h3>
                            </div>
                            <div class="movers-sort-tabs">
                                <span class="mover-tab" onclick="setDetailTrendRange('1w', this)">1周</span>
                                <span class="mover-tab" onclick="setDetailTrendRange('1m', this)">1月</span>
                                <span class="mover-tab active" onclick="setDetailTrendRange('3m', this)">3月</span>
                                <span class="mover-tab" onclick="setDetailTrendRange('all', this)">全部</span>
                            </div>
                        </div>
                        <div id="detail-trend-chart" class="echarts-container large"></div>
                    </div>
                    <div class="matrix-card">
                        <h3>📊 资产配置比例</h3>
                        <div id="detail-asset-chart" class="echarts-container small"></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="data/holdings.js"></script>
    <script src="js/main.js?v=3"></script>
</body>
</html>
